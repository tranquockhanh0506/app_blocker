name: app_blocker
description: "Cross-platform app blocking plugin for Flutter. Block apps with overlay (Android) and Screen Time Shield (iOS). Supports scheduling, focus profiles, and real-time blocking events."
version: 2.0.0
homepage: https://github.com/tranquockhanh0506/app_blocker
repository: https://github.com/tranquockhanh0506/app_blocker
issue_tracker: https://github.com/tranquockhanh0506/app_blocker/issues

environment:
  sdk: ^3.10.1
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.khanhtq.app_blocker
        pluginClass: AppBlockerPlugin
      ios:
        pluginClass: AppBlockerPlugin
